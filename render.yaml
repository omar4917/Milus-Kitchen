services:
  - type: web
    name: laravel-synchrove
    runtime: node
    plan: free
    buildCommand: "composer install --no-dev --optimize-autoloader && npm install && npm run build"
    startCommand: "vendor/bin/heroku-php-apache2 public/"
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://laravel.synchrove.com
      - key: DB_CONNECTION
        value: pgsql
      - key: APP_KEY
        sync: false # You will paste this manually in the dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: lilus_kitchen
          property: connectionString

databases:
  - name: meal-db
    plan: free
