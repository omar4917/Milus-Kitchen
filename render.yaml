services:
  - type: web
    name: laravel-synchrove
    runtime: node
    plan: free
    region: ohio
    buildCommand: "composer install --no-dev --optimize-autoloader && npm install && npm run build"
    startCommand: "vendor/bin/heroku-php-apache2 public/"
    envVars:
      - key: BUILDPACK_URL
        value: https://github.com/heroku/heroku-buildpack-php
      - key: NODE_VERSION
        value: 20
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://laravel.synchrove.com
      - key: DB_CONNECTION
        value: pgsql
      - key: APP_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: lilus_kitchen
          property: connectionString

databases:
  - name: lilus_kitchen
    plan: free
    region: virginia
