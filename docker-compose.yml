version: '3.8'

services:
  # PHP Service
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: lilus-kitchen-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - lilus-network

  # Nginx Service
  web:
    image: nginx:alpine
    container_name: lilus-kitchen-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/laravel.conf:/etc/nginx/conf.d/default.conf
    networks:
      - lilus-network
    depends_on:
      - app

  # MySQL Service
  db:
    image: mysql:8.0
    container_name: lilus-kitchen-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-lilus_kitchen}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_USER: ${DB_USERNAME:-lilus_user}
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - lilus-network

networks:
  lilus-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
